worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Keycloak JWTs can be large; raise header buffer limits to avoid 400s
    client_header_buffer_size    4k;
    large_client_header_buffers  4 32k;

    # Raise body limit to match backend (useful for file uploads proxied through here)
    client_max_body_size 4G;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    server {
        listen 3000;
        root /usr/share/nginx/html;
        index index.html;

        # SPA fallback: all unknown paths return index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Long-lived cache for hashed static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Never cache the entry-point
        location = /index.html {
            add_header Cache-Control "no-cache";
        }
    }
}
