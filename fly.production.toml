# fly.toml app configuration file generated for realityhack-world-frontend-production on 2024-10-16T19:04:17-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'realityhack-world-frontend-production'
primary_region = 'ewr'

[build]
  dockerfile = 'Dockerfile.fly'

  [build.args]
    VITE_BACKEND_URL="https://api.realityhack.world"
    VITE_BACKEND_WS_URL="wss://api.realityhack.world"
    VITE_TEAM_FORMATION_STAGE="0"

    # default features
    VITE_IS_HOME_ENABLED="true"
    VITE_IS_ADMIN_ENABLED="true"
    VITE_IS_SETTINGS_TAB_ENABLED="true"

    # Ready features
    VITE_IS_HARDWARE_CHECKOUT_ENABLED="false"
    VITE_IS_TEAMS_ENABLED="false"
    VITE_IS_HACKER_HELP_ENABLED="false"
    VITE_IS_MENTOR_HELP_ENABLED="false"
    VITE_SPECIAL_TRACKS_ENABLED="true"
    
    # WIP features
    VITE_IS_SCHEDULE_ENABLED="false"
    VITE_IS_SPONSOR_DASHBOARD_ENABLED="false"
    VITE_IS_SHOWCASE_ENABLED="false"
    VITE_IS_TRACKS_ENABLED="false"
    VITE_IS_WORKSHOPS_ENABLED="false"
    VITE_IS_RESOURCES_TAB_ENABLED="false"
    VITE_IS_EVENT_GUIDE_ENABLED="false"
    VITE_IS_HACKERS_MET_ENABLED="false"
    VITE_IS_LIGHTHOUSES_ENABLED="false"
    VITE_IS_EVENTS_ENABLED="false"

    VITE_KEYCLOAK_ISSUER="https://auth.realityhack.world/realms/reality-hack-2025"
    VITE_KEYCLOAK_ID="reality-hack-web"
    VITE_KEYCLOAK_ISSUER_CLIENT_ID="f4bf3bc7-66eb-48f4-ae5f-2569df3a2617"
    VITE_EVENT_YEAR="2026"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.tls_options]
    alpn = ["h2", "http/1.1"]
    versions = ["TLSv1.2", "TLSv1.3"]

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
